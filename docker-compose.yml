services:
  mysql:
    image: mysql:8.4
    container_name: tp-hr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tp_hr
      MYSQL_USER: tp_hr_user
      MYSQL_PASSWORD: tp_hr_password
    ports:
      - "3307:3306"
    volumes:
      - tp-hr-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: tp-hr-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ASSISTANT_PROVIDER: ${ASSISTANT_PROVIDER:-gemini}
      # 파일 저장소: local(기본, 아래 uploads 볼륨 사용) 또는 s3
      FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-local}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    ports:
      - "8081:8080"
    volumes:
      - tp-hr-uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8081/api
        NEXT_PUBLIC_KAKAO_JS_KEY: faa308764fee34b6745b44e795057fc6
    container_name: tp-hr-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  tp-hr-mysql-data:
  tp-hr-uploads:
